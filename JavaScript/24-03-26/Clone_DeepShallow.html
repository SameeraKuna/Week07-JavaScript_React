<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deep Clone Object Demo</title>
</head>
<body>

  <h2>Deep Copy & Shallow Copy</h2>

  <p><strong>Original Object:</strong></p>
  <pre id="original"></pre>

  <p><strong>Cloned & Modified Object:</strong></p>
  <pre id="cloned"></pre>

  <script>
    // -------- Original Object --------
    const originalObj = {
      name: "Sameera",
      age: 25,
      address: {
        city: "Bangalore",
        zip: 560067
      }
    };

    //DeepCopy
    const clonedObj = JSON.parse(JSON.stringify(originalObj));

    //On modification
    clonedObj.name = "Giri";
    clonedObj.address.city = "Hyderabad";

    document.getElementById("original").textContent = JSON.stringify(originalObj, null, 2); //JSON.stringify(value, replacer(to filter out since null includes all), indentationSpace)

    document.getElementById("cloned").textContent = JSON.stringify(clonedObj, null, 2);

    //Shallow copy
    const shallowCopy = { ...originalObj };
    shallowCopy.address.city = "Delhi";

    console.log("After shallow copy change:");
    console.log("Original city:", originalObj.address.city); // impacts the nested elements inside object
  </script>

</body>
</html>
