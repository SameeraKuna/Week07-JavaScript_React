<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sorting Complex Data Demo</title>
  <style>
    table {
      border-collapse: collapse;
      width: 50%;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #333;
      padding: 8px 12px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>

  <h2>Sorted User Table</h2>

  <table id="userTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>City</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    // -------- Sample User Data --------
    const users = [
      { name: "Alice", age: 25, city: "Mumbai" },
      { name: "Bob", age: 20, city: "Delhi" },
      { name: "Charlie", age: 25, city: "Bangalore" },
      { name: "David", age: 30, city: "Kolkata" },
      { name: "Eve", age: 20, city: "Chennai" }
    ];

    // Sort logic->sorted by age, then by name
    users.sort((a, b) => {
      // Sort by age ascending
      if (a.age !== b.age) {
        return a.age - b.age;
      }
      // If age is same, sort by name alphabetically
      return a.name.localeCompare(b.name);
    });

    //Table building
    const tbody = document.querySelector("#userTable tbody");
    users.forEach(user => {
      const row = document.createElement("tr");
      row.innerHTML = `<td>${user.name}</td><td>${user.age}</td><td>${user.city}</td>`;
      tbody.appendChild(row);
    });
  </script>

</body>
</html>
